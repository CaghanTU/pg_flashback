name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.16.1"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked

      - name: Initialize pgrx (needed for proc-macro compilation)
        run: cargo pgrx init --pg17 download

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --no-default-features --features pg17 -- -D warnings

  test:
    name: Test (PG ${{ matrix.pg }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg: ["15", "16", "17", "18"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pg${{ matrix.pg }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-pg${{ matrix.pg }}-

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked

      - name: Initialize pgrx for PG ${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Remove stale test-pgdata (prevents mutex lock errors)
        run: rm -rf target/test-pgdata

      - name: cargo pgrx test
        run: cargo pgrx test pg${{ matrix.pg }}

  audit:
    name: Security audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

