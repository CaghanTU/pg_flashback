name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.16.1"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked

      - name: Initialize pgrx for PG 17
        run: cargo pgrx init --pg17 download

      - name: Build extension (PG17)
        run: cargo pgrx package --no-default-features --features pg17

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist
          tar -czf "dist/pg_flashback-${VERSION}-pg17.tar.gz" \
            target/release/pg_flashback-pg17/ \
            sql/ \
            pg_flashback.control \
            README.md \
            LICENSE

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract section for this version from the upgrade scripts
          echo "Release pg_flashback v${VERSION}" > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          if [[ -f "sql/upgrade/pg_flashback--*.--${VERSION}.sql" ]]; then
            head -30 sql/upgrade/pg_flashback--*.--${VERSION}.sql >> /tmp/release_notes.md
          fi
          echo "NOTES_FILE=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.NOTES_FILE }}
          files: dist/*.tar.gz
          draft: false
          prerelease: false
